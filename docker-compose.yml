services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: hipaaa
      POSTGRES_PASSWORD: hipaaa_local
      POSTGRES_DB: hipaaa
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hipaaa"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
