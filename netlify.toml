[build]
  command = "pnpm run typecheck && pnpm run db:generate"
  publish = "public"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  included_files = ["prisma/generated/client/**"]

[dev]
  port = 8888
  functions = "netlify/functions"
